name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Run just fmt
        run: nix develop --command just fmt

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-

      - name: Run just clippy
        run: nix develop --command just clippy

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-

      - name: Cache opencode npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-opencode-${{ hashFiles('.opencode/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-opencode-

      - name: Install opencode plugin dependencies
        run: nix develop --command npm --prefix .opencode ci

      - name: Run just test
        run: nix develop --command just test

  deny:
    name: Dependency policy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Run just deny
        run: nix develop --command just deny

  acceptance:
    name: Acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-

      - name: Run just accept
        run: nix develop --command just accept

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ github.job }}-

      - name: Cache event-model browser npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-event-model-browser-${{ hashFiles('docs/event-model/browser/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-event-model-browser-

      - name: Install event model browser dependencies
        run: nix develop --command npm --prefix docs/event-model/browser ci

      - name: Run just build
        run: nix develop --command just build
