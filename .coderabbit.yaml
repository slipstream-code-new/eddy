reviews:
  request_changes_workflow: true
  path_filters:
    - "!Cargo.lock"
    - "!flake.lock"
    - "!.opencode/package-lock.json"
    - "!docs/event-model/browser/package-lock.json"
  path_instructions:
    - path: "Cargo.toml"
      instructions: >
        The `[lints.clippy]` block in this file is machine-generated by
        `scripts/sync-clippy-lints.mjs` from `clippy-driver -W help` output.
        Do not suggest edits to individual lint entries in that block; only
        flag it if the generator script itself appears to be out of sync
        (e.g. the file's own drift-check would fail).
    - path: "docs/event-model/browser/**"
      instructions: >
        This is a separate Vite + TypeScript application (not part of the
        Rust crate). Apply TypeScript/JavaScript and Vite review conventions
        here, not Rust conventions.
    - path: ".opencode/**"
      instructions: >
        This is Node-based agent tooling with its own package-lock.json.
        Apply TypeScript/JavaScript review conventions here, not Rust
        conventions.
    - path: "src/**"
      instructions: >
        This project enforces a strict Clippy lint policy (see
        `[lints.clippy]` in Cargo.toml) that forbids most `unwrap`/`expect`
        usage and favors explicit error handling. Review Rust code against
        that house style rather than more permissive defaults.
