[package]
name = "eddy"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "An agentic coding harness for learning about LLM agents."
repository = "https://git.johnwilger.com/Slipstream/eddy"
keywords = ["agent", "llm", "tui"]
categories = ["command-line-utilities", "development-tools"]

[dependencies]
serde_json = "1.0.149"

[[example]]
name = "first_launch_setup_acceptance"
path = "examples/first_launch_setup_acceptance.rs"
harness = false

# Clippy lint policy: enable the high-signal stable groups at `forbid` while
# intentionally leaving experimental (`nursery`), subjective (`pedantic`), and
# contradictory (`restriction`) groups disabled as groups. Selected restriction
# lints below are exact opt-ins for quality, test diagnostics, and LLM-friendly
# maintainability.
#
# If a third-party macro emits an `allow`, the only permitted project-wide
# exception is changing that exact lint from `forbid` to `deny`; never downgrade
# a containing group such as `clippy::all`, `clippy::cargo`, or
# `clippy::restriction`.
[lints.clippy]
# Generated from `clippy-driver -W help` by `scripts/sync-clippy-lints.mjs`.
# Keep every current `clippy::all` member enumerated exactly rather than
# setting `clippy::all = "forbid"`; group-level `forbid` conflicts with
# third-party macro `allow` attributes and emits `forbidden_lint_groups`,
# a future-incompat warning that `-D warnings` intentionally does not catch.
cargo = { level = "forbid", priority = -1 }
# Exact restriction-lint opt-ins remain listed here with the same policy.
